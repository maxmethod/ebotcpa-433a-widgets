<!-- =====================================================================
     ebotCPA 433-A WIDGETS — GHL EMBED SNIPPETS
     Headers match Form 433-A (Rev. 6-2026) — Section 4, Personal Asset Information.
     Pin to a real published tag (not @main). Current target tag: @v3.5.2.
     =====================================================================

  ┌───────────────────────────────────────────────────────────────────┐
  │ RECOMMENDED — one embed per page (Custom-Code block on each slide) │
  └───────────────────────────────────────────────────────────────────┘
  Paste each pair (div + script) into a Custom-Code/HTML element on its own slide.
  WHY per-page and NOT the one-paste bundle: GHL auto-SKIPS a survey slide whose only
  question is hidden. Each asset slide here holds just its one summary field, which the
  widget hides — so without a Custom-Code element ON that slide, GHL skips it. The per-page
  Custom-Code block IS that element (it also gives the widget its mount point). The unified
  bundle (embed-433a.js) only suits surveys where each asset slide has another visible
  element; on this survey it makes 7-10/12 vanish. -->

<!-- BANK ACCOUNTS · writes 433a__bank_accounts_summary -->
<div id="bank-433a-widget" data-primary-color="{{custom_values.brand_primary_color}}"></div>
<script src="https://cdn.jsdelivr.net/gh/maxmethod/ebotcpa-433a-widgets@v3.5.2/dist/embed-bank-accounts.js"></script>

<!-- INVESTMENTS · writes 433a__investments_summary -->
<div id="investments-433a-widget" data-primary-color="{{custom_values.brand_primary_color}}"></div>
<script src="https://cdn.jsdelivr.net/gh/maxmethod/ebotcpa-433a-widgets@v3.5.2/dist/embed-investments.js"></script>

<!-- DIGITAL ASSETS · writes 433a__digital_assets_summary -->
<div id="digital-assets-433a-widget" data-primary-color="{{custom_values.brand_primary_color}}"></div>
<script src="https://cdn.jsdelivr.net/gh/maxmethod/ebotcpa-433a-widgets@v3.5.2/dist/embed-digital-assets.js"></script>

<!-- AVAILABLE CREDIT + LIFE INSURANCE (ONE slide, two sections)
     writes 433a__available_credit_summary AND 433a__life_insurance_summary
     ⚠ Both native fields MUST stay on this one slide — the widget renders both sections here. -->
<div id="credit-433a-widget" data-primary-color="{{custom_values.brand_primary_color}}"></div>
<script src="https://cdn.jsdelivr.net/gh/maxmethod/ebotcpa-433a-widgets@v3.5.2/dist/embed-available-credit.js"></script>

<!-- INCOME / EXPENSE live calc · writes the two TEXT (Auto) totals.
     Paste ONCE on the Income slide (it drives BOTH income + expense via the shared DOM).
     These slides have visible line-item questions, so they are NOT at risk of being skipped.
     The two total fields MUST be TEXT (GHL MONETARY fields drop a programmatic write on submit). -->
<script src="https://cdn.jsdelivr.net/gh/maxmethod/ebotcpa-433a-widgets@v3.5.2/dist/embed-income-expense-calc.js"></script>
