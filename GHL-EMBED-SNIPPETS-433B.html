<!-- ── SLIDE 1 · IRS NOTICE / URGENCY CARDS · styles the 433b__urgency_level radio ──

     radio (business.433b__urgency_level, options Critical / High Priority / Standard) into
     three selectable cards (badge + title + business notice codes + callback SLA) and adds
     a "Why this matters" callout above them. Put these 4 business fields on the slide:
       433b__urgency_level (RADIO — the question)   433b__notice_typenumber (TEXT)
       433b__notice_date (DATE)                     433b__amount_owed (MONETORY)
     The widget finds the radio by its OPTION VALUES {critical/high_priority/standard}, so
     you can name the question anything (data-q doesn't have to match). The "START HERE"
     eyebrow / heading / subtitle are native slide text — set them in the builder. -->

<!-- ── SECTION 5 · INCOME / EXPENSE / NET live calc · NO div, paste ONCE ──────────

     injects a live card on each of their slides, writing 3 TEXT totals on submit:
       Income (L36)  = sum of 6 income lines  → 433b_income__total_monthly_auto
       Expenses (L49)= sum of 12 expense lines→ 433b_expense__total_monthly_auto  (incl. L48 installments)
       Net (L50)     = income − expenses      → 433b_line_50__net_income_auto
     The 3 *_auto fields MUST be TEXT (GHL drops programmatic writes to currency-masked
     MONETARY fields). The per-line inputs stay MONETARY (the client types those).
     The two *_other_description fields are plain TEXT — NOT summed. -->
